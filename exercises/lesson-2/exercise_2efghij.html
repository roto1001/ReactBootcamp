<!DOCTYPE html>
<html lang="de">
    <head>
        <title>React Basics</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">

            function ProductDetails(props) {
                const {name, price, discountPrice, imgSrc} = props;
                /*
                return (
                        <>
                            <p>{name}</p>
                            {!discountPrice && (
                                <p>Price: ${price}</p>
                            )}
                            {discountPrice && (
                                <>
                                    <del>Price: ${price}</del>
                                    <p>Discount price: ${discountPrice}</p>
                                </>
                            )}
                            <button>Add to cart</button>
                        </>
                    );
                */
                return (
                    <>
                        <img src={imgSrc} width="50"></img>
                        <p>{name}</p>
                        {!discountPrice ? (
                            <p>Price: ${price}</p>
                        ) : (
                            <>
                                <del>Price: ${price}</del>
                                <p>Discount price: ${discountPrice}</p>
                            </>
                        )}
                        <button>Add to cart</button>
                    </>
                );
            }

            function App() {
                return (
                    <>
                        <ProductDetails name="Cotton socks" price="10.90" discountPrice="5.45" imgSrc="/exercises/lesson-2/images/cotton-socks.png" />
                        <ProductDetails name="Tennis Balls" price="6.00" imgSrc="/exercises/lesson-2/images/tennis-balls.png" />
                        <ProductDetails name="Plain T-Shirt" price="7.99" imgSrc="/exercises/lesson-2/images/plain-t-shirt.png" />
                    </>
                );
            }

            const container = document.querySelector('.js-container');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);


        </script>
    </body>
</html>
