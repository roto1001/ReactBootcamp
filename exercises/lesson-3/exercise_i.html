<!DOCTYPE html>
<html lang="de">
    <head>
        <title>Chatbot</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function ChatInput({ chatMessages, setChatMessages }) {
                const [inputText, setInputText] = React.useState('');
                const [loadingText, setLoadingText] = React.useState('');
                const [isLoading, setIsLoading] = React.useState(false);

                function saveInputText(event) {
                    setInputText(event.target.value);
                }
                /*
                function sendMessage() {
                    setChatMessages([
                        ...chatMessages,
                        {
                            message: inputText,
                            sender: 'user',
                            id: crypto.randomUUID(),
                        }
                    ]);

                    const response = Chatbot.getResponse(inputText);
                    setChatMessages([
                        ...ChatMessages,
                        {
                            message: response,
                            sender: 'robot',
                            id: crypto.randomUUID(),
                        }
                    ]);

                    setInputText('');
                }
                */
                async function sendMessage() {

                    if (isLoading || inputText.trim() === '') return;

                    const newChatMessages = [
                        ...chatMessages,
                        {
                            message: inputText,
                            sender: 'user',
                            id: crypto.randomUUID(),
                        }
                    ]

                    setChatMessages(newChatMessages);
                    setInputText('');
                    setLoadingText("Loading...");
                    setIsLoading(true);

                    const response = await Chatbot.getResponseAsync(inputText);
                    setChatMessages([
                        ...newChatMessages,
                        {
                            message: response,
                            sender: 'robot',
                            id: crypto.randomUUID(),
                        }
                    ]);

                    setLoadingText('');
                    setIsLoading(false);
                }

                function eventKeyPressed(event) {
                    event.key === 'Enter' && sendMessage();
                    event.key === 'Escape' && setInputText('');
                }

                return (
                    <>
                        <input
                            placeholder="Send a message to Chatbot"
                            size="30"
                            onChange={saveInputText}
                            value={inputText}
                            onKeyDown={eventKeyPressed}
                        />
                        <button onClick={sendMessage} disabled={isLoading || inputText.trim() === ''}>
                            Send
                        </button>
                        <p>{loadingText}</p>
                    </>
                );
            }

            function ChatMessage(props) {
                const { message, sender } = props;
                return (
                    <div>
                        {(sender === 'robot') &&
                            (<img src="./images/robot.png" width="50" />
                            )}

                        {message}

                        {(sender === 'user') &&
                            (<img src="./images/user.png" width="50" />
                            )}
                    </div>
                );
            }

            function ChatMessages({ chatMessages }) {
                // const chatMessages = array[0];
                // const setChatMessages = array[1];
                // const [chatMessages, setChatMessages] = array;

                return (
                    <>
                        {chatMessages.map((chatMessage) => {
                                return (
                                    <ChatMessage
                                        sender={chatMessage.sender}
                                        message={chatMessage.message}
                                        key = {chatMessage.id}
                                    />
                                );
                            })
                        }
                    </>
                );

            }

            function App() {
                /*
                const chatMessageComponents = chatMessages.map((chatMessage) => {
                    return (
                        <ChatMessage
                            sender={chatMessage.sender}
                            message={chatMessage.message}
                        />
                    );
                })
                */

                const [chatMessages, setChatMessages] = React.useState([
                    {
                        message: 'Hello chatbot',
                        sender: 'user',
                        id: 'id1',
                    }, {
                        message: 'Hello! how can I help you?',
                        sender: 'robot',
                        id: 'id2',
                    }, {
                        message: 'Can you get me today\'s date?',
                        sender: 'user',
                        id: 'id3',
                    }, {
                        message: 'Today is February 23.',
                        sender: 'robot',
                        id: 'id4',
                    }]);

                return (
                    <>
                        <ChatInput
                            chatMessages={chatMessages}
                            setChatMessages={setChatMessages}
                        />
                        <ChatMessages
                            chatMessages={chatMessages}
                        />
                    </>
                );
            }

            const container = document.querySelector('.js-container');
            // ReactDOM.createRoot(container).render(app);
            ReactDOM.createRoot(container).render(<App />);


        </script>
    </body>
</html>
